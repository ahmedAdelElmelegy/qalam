flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#0d2f4d"
  adaptive_icon_foreground: "assets/images/logo_icon.png"
  
  # Optional: Customize for different platforms
  min_sdk_android: 21
  
  # Web
  web:
    generate: true
    image_path: "assets/images/logo_icon.png"
    background_color: "#0d2f4d"
    theme_color: "#0d2f4d"
  
  # Windows
  windows:
    generate: true
    image_path: "assets/images/logo_icon.png"
    icon_size: 48
  
  # MacOS
  macos:
    generate: true
    image_path: "assets/images/logo_icon.png"
